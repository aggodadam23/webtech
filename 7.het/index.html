<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Órai munka - Főoldal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <a href="index.html">Főoldal</a>
        <a href="user-search.html">Felhasználó kereső</a>
    </div>

    <div class="container">
        <h1>JSONPlaceholder</h1>
        <p>Posztok lekérése a JSONPlaceholder API-ról.</p>
        
        <button id="loadPostsBtn" class="btn btn-primary">Bejegyzések betöltése</button>

        <div id="postsContainer" class="row" style="margin-top: 20px;">
            </div>
    </div>

    <script>
        document.getElementById('loadPostsBtn').addEventListener('click', () => {
            
            // Lekérdezzük a posztokat (GET kérés)
            fetch("https://jsonplaceholder.typicode.com/posts")
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Hálózati hiba történt.');
                    }
                    return response.json();
                })
                .then(data => {
                    const container = document.getElementById('postsContainer');
                    container.innerHTML = ''; // Ürítjük a konténert

                    // Csak az első 10 posztot jelenítjük meg, hogy ne legyen túl hosszú a lista
                    const firstTenPosts = data.slice(0, 10);

                    firstTenPosts.forEach(post => {
                        const postCard = document.createElement('div');
                        postCard.className = 'col col-4'; // Rácsrendszer a te CSS-edből
                        
                        postCard.innerHTML = `
                            <div class="card">
                                <h3>${post.title}</h3>
                                <p>${post.body}</p>
                                <small>Poszt ID: ${post.id}</small>
                            </div>
                        `;
                        container.appendChild(postCard);
                    });
                })
                .catch(error => {
                    console.error("Hiba:", error);
                    alert("Nem sikerült lekérni a bejegyzéseket!");
                });
        });
    </script>
</body>
</html>
